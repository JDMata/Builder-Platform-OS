name: sap-app-factory

# Only services a currently-scheduled Sprint 0 story actually consumes are
# included here — see infra/README.md "Why Redis and MinIO aren't here yet"
# for the reviewed, documented reasoning behind that line.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${SAF_POSTGRES_USER:-saf}
      POSTGRES_PASSWORD: ${SAF_POSTGRES_PASSWORD:-saf_dev_password}
      POSTGRES_DB: ${SAF_POSTGRES_DB:-sap_app_factory}
    ports:
      # 5432 is the single most commonly already-occupied local dev port —
      # confirmed by hand: this machine already has an unrelated project's
      # Postgres container bound to it. Defaulting elsewhere avoids that
      # class of collision instead of assuming a clean machine.
      - "${SAF_POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SAF_POSTGRES_USER:-saf} -d ${SAF_POSTGRES_DB:-sap_app_factory}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${SAF_KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${SAF_KEYCLOAK_ADMIN_PASSWORD:-admin_dev_password}
    ports:
      - "${SAF_KEYCLOAK_HOST_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector:0.114.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "${SAF_OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${SAF_OTEL_HTTP_HOST_PORT:-4318}:4318"
      - "${SAF_OTEL_HEALTH_HOST_PORT:-13133}:13133"
    # No container-exec healthcheck: verified by hand that this official
    # image is distroless (no /bin/sh, wget, or curl — confirmed via `docker
    # run --entrypoint="" ... ls /bin`, which itself fails with "ls not
    # found"), so no command can run *inside* the container to probe its own
    # health_check extension. The extension is still enabled and published
    # on 13133 above — verify readiness from the host (`curl
    # http://localhost:13133/`) or via infra/README.md's verification steps.

volumes:
  postgres-data:
